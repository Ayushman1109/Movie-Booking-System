services:
  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: movie_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d movie_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./MovieBack
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./MovieBack/src/main/resources/env.properties
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: ./MovieFront
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
