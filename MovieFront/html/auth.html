<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <div id="auth-container">
        <div class="auth-header">
            <h1>Movie Booking System</h1>
            <p>Sign in to your account or create a new one</p>
        </div>

        <!-- Tab Switcher -->
        <div class="auth-tabs">
            <button class="tab-btn active" id="login-tab" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" id="register-tab" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form" onsubmit="handleLogin(event)" novalidate>
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" placeholder="Enter your username" required />
                <span class="error-msg" id="login-username-error"></span>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="login-password" placeholder="Enter your password" required />
                    <button type="button" class="toggle-password" onclick="togglePassword('login-password', this)">Show</button>
                </div>
                <span class="error-msg" id="login-password-error"></span>
            </div>
            <div id="login-error" class="form-error hidden"></div>
            <button type="submit" class="auth-btn">Login</button>
            <p class="form-footer">Don't have an account? <a href="#" onclick="switchTab('register'); return false;">Register here</a></p>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)" novalidate>
            <div class="form-group">
                <label for="reg-name">Username</label>
                <input type="text" id="reg-name" placeholder="Choose a username" required />
                <span class="error-msg" id="reg-name-error"></span>
            </div>
            <div class="form-group">
                <label for="reg-email">Email Address</label>
                <input type="email" id="reg-email" placeholder="Enter your email" required />
                <span class="error-msg" id="reg-email-error"></span>
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="reg-password" placeholder="Create a password (min 6 chars)" required />
                    <button type="button" class="toggle-password" onclick="togglePassword('reg-password', this)">Show</button>
                </div>
                <span class="error-msg" id="reg-password-error"></span>
            </div>
            <div class="form-group">
                <label for="reg-confirm">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="reg-confirm" placeholder="Re-enter your password" required />
                    <button type="button" class="toggle-password" onclick="togglePassword('reg-confirm', this)">Show</button>
                </div>
                <span class="error-msg" id="reg-confirm-error"></span>
            </div>
            <div id="register-error" class="form-error hidden"></div>
            <div id="register-success" class="form-success hidden"></div>
            <button type="submit" class="auth-btn">Create Account</button>
            <p class="form-footer">Already have an account? <a href="#" onclick="switchTab('login'); return false;">Login here</a></p>
        </form>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
